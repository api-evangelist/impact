    url: https://integrations.impact.com/
  - url: graphql/impact-graphql.md
    type: GraphQL
- aid: impact:partner-api
  name: Impact Partner API
  description: REST API for media partners and publishers to access campaigns, report
    on content performance, manage commission tracking, and query earning reports.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://integrations.impact.com/
  baseURL: https://api.impact.com/MediaPartners/{AccountSID}/
  tags:
  - Publisher
  - Partner
  - Media
  - Commission
  - Reporting
  properties:
  - type: Documentation
    url: https://integrations.impact.com/
  - type: Authentication
    url: https://integrations.impact.com/
- aid: impact:agency-api
  name: Impact Agency API
  description: REST API for agencies to manage multiple client accounts, consolidate
    reporting across brands, and automate partnership operations at scale.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://integrations.impact.com/
  baseURL: https://api.impact.com/Agencies/{AccountSID}/
  tags:
  - Agency
  - Multi-client
  - Reporting
  - Automation
  properties:
