modified: '2026-06-13'
specificationVersion: '0.19'
tags:
- Affiliate
- Partnerships
- Performance Marketing
- Commission
- Tracking
- Creator Economy
- Partner Management
apis:
- aid: impact:brand-api
  name: Impact Brand API
  description: REST API for brands to manage partnership campaigns, track conversions,
    process commissions, manage contracts, and report on partnership performance.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://integrations.impact.com/
  baseURL: https://api.impact.com/Advertisers/{AccountSID}/
  tags:
  - Brand
  - Advertiser
  - Campaigns
  - Conversions
  - Contracts
  properties:
