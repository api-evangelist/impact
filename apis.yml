aid: impact
name: Impact
description: Partnership management platform with a REST API for managing affiliate
  relationships, tracking conversions, paying partners, and reporting on partnership
  performance across brands.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/impact/refs/heads/main/apis.yml
